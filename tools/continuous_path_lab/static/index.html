<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Continuous Path Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Continuous Path Lab</h1>
        <span id="backendText">Backend: checking</span>
      </div>

      <section>
        <h2>Input</h2>
        <label>
          Source
          <select id="sourceType">
            <option value="builtin">Built-in shape</option>
            <option value="file">DXF or STL file</option>
            <option value="polygon">Polygon JSON</option>
          </select>
        </label>

        <label id="builtinRow">
          Shape
          <select id="shapeSelect"></select>
        </label>

        <label id="fileRow" class="hidden">
          File
          <input id="fileInput" type="file" accept=".dxf,.stl">
        </label>

        <div id="stlRows" class="hidden grid2">
          <label>
            Layer height
            <input id="layerHeight" type="number" min="0.01" step="0.01" value="0.20">
          </label>
          <label>
            Layer index
            <input id="layerIndex" type="number" min="0" step="1" value="1">
          </label>
        </div>

        <label id="polygonRow" class="hidden">
          Polygon JSON
          <textarea id="polygonJson" spellcheck="false">{"name":"custom","outer":[[-40,-25],[40,-25],[40,25],[-40,25]],"holes":[]}</textarea>
        </label>
      </section>

      <section>
        <h2>Planner</h2>
        <label>
          Algorithm
          <select id="algorithm">
            <option value="contour_tree_v6">Contour tree v6</option>
            <option value="contour_tree_v5">Contour tree v5</option>
            <option value="contour_tree_v4">Contour tree v4</option>
            <option value="contour_tree_v3">Contour tree v3</option>
            <option value="contour_tree_v2">Contour tree v2</option>
            <option value="legacy_cfs">Legacy CFS comparison</option>
          </select>
        </label>
        <label>
          Direction
          <select id="direction">
            <option value="inward">Spiral inward</option>
            <option value="outward">Spiral outward</option>
          </select>
        </label>
        <div class="grid2">
          <label>
            Line width
            <input id="lineWidth" type="number" min="0.05" step="0.05" value="1.20">
          </label>
          <label>
            Spacing
            <input id="spacing" type="number" min="0.05" step="0.05" value="1.20">
          </label>
          <label>
            SDF grid
            <input id="grid" type="number" min="40" max="420" step="10" value="180">
          </label>
          <label>
            Coverage
            <input id="coverageThreshold" type="number" min="0.1" max="1" step="0.01" value="0.99">
          </label>
          <label>
            Overlap
            <input id="overlapThreshold" type="number" min="0" max="1" step="0.01" value="0.02">
          </label>
          <label>
            Spacing max
            <input id="spacingWarningThreshold" type="number" min="0" max="1000" step="1" value="3">
          </label>
          <label>
            Start
            <input id="startFraction" type="number" min="0" max="1" step="0.01" value="0.00">
          </label>
          <label>
            End
            <input id="exitFraction" type="number" min="0" max="1" step="0.01" value="0.50">
          </label>
          <label>
            Attempts
            <input id="retryAttempts" type="number" min="1" max="16" step="1" value="4">
          </label>
        </div>
        <button id="generateBtn" type="button">Generate Toolpath</button>
      </section>

      <section>
        <h2>View</h2>
        <label class="check"><input id="showContours" type="checkbox" checked> Offset contours</label>
        <label class="check"><input id="showTree" type="checkbox" checked> Tree connectors</label>
        <label class="check"><input id="showUnderfill" type="checkbox" checked> Underfill audit</label>
        <label class="check"><input id="showOverlap" type="checkbox" checked> Overlap audit</label>
        <label>
          <span class="labelLine">
            <span>Extrusion progress</span>
            <span id="progressText">100.00%</span>
          </span>
          <input id="progress" type="range" min="0" max="10000" step="1" value="10000">
        </label>
        <div class="actions">
          <button id="downloadJson" type="button" disabled>Export JSON</button>
          <button id="downloadSvg" type="button" disabled>Export SVG</button>
        </div>
      </section>
    </aside>

    <section class="workspace">
      <div class="topbar">
        <div>
          <strong id="statusText">Ready</strong>
          <span id="subStatus"></span>
        </div>
        <div id="quickStats"></div>
      </div>
      <div class="previewWrap">
        <svg id="preview" role="img" aria-label="Toolpath preview"></svg>
      </div>
      <div class="details">
        <section>
          <h2>Metrics</h2>
          <dl id="metrics"></dl>
        </section>
        <section>
          <h2>Diagnostics</h2>
          <ul id="diagnostics"></ul>
        </section>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
